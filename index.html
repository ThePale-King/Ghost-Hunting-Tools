<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Hunting Suite</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Paranormal Suite</h1>

<div class="dashboard">

    <!-- MAIN VIEWFINDER -->
    <div class="tool-box main-view" id="cameraContainer">
        <h2 id="modeTitle">SYSTEM: SLS OVERLAY</h2>
        
        <div class="canvas-container">
            <canvas id="mainCanvas"></canvas>
            <video id="rawVideo" autoplay playsinline muted></video>
        </div>

        <div class="controls-grid">
            <button id="initBtn" onclick="initSuite()" style="border-color: #ff0055;">Sync System</button>
            <button id="torchBtn" onclick="toggleFlashlight()">Flashlight: OFF</button>
            <button onclick="toggleMode()">Switch Mode</button>
            <button onclick="toggleFullscreen()">Fullscreen</button>
            <button id="recBtn" onclick="toggleRecording()">Record Session</button>
            <button id="downloadBtn" onclick="downloadVideo()" disabled>Save MP4</button>
        </div>

        <div class="slider-container" id="nvControls" style="display:none;">
            <label>GAIN:</label>
            <input type="range" id="nvGain" min="1" max="20" step="0.5" value="6">
            <span id="nvGainVal">6x</span>
        </div>
    </div>

    <!-- MOTION SENSOR -->
    <div class="tool-box">
        <h2>Motion & Activity</h2>
        <div id="remStatus" class="status-display">STANDBY</div>
        <div id="logContainer">
            <div id="timestampLog">Logs empty...</div>
        </div>
        <div class="controls-grid">
            <button onclick="armREMPod()" style="color: #00ff66;">Arm</button>
            <button onclick="disarmREMPod()" style="color: #ff0055;">Disarm</button>
            <button onclick="downloadLogs()">Export TXT</button>
        </div>
    </div>

    <!-- AUDIO VISUALIZER -->
    <div class="tool-box">
        <h2>EVP Audio Visualizer</h2>
        <canvas id="audioCanvas"></canvas>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
