<!-- MAIN VIEWFINDER TOOL -->
<div class="tool-box main-view" id="cameraContainer">
    <h2 id="modeTitle">SYSTEM: SLS OVERLAY</h2>
    
    <div class="canvas-container">
        <canvas id="mainCanvas"></canvas>
        <video id="rawVideo" autoplay playsinline muted></video>
    </div>

    <div class="controls-grid">
        <button onclick="toggleMode()">Switch Mode</button>
        <!-- NEW FULLSCREEN BUTTON -->
        <button onclick="toggleFullscreen()">Fullscreen</button>
        <button id="recBtn" onclick="toggleRecording()">Record Session</button>
        <button id="downloadBtn" onclick="downloadVideo()" disabled>Save MP4</button>
    </div>

    <div class="slider-container" id="nvControls" style="display:none;">
        <label>GAIN:</label>
        <input type="range" id="nvGain" min="1" max="20" step="0.5" value="6">
        <span id="nvGainVal">6x</span>
    </div>
</div>
